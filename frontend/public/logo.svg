<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="cloudGrad" x1="0" y1="0" x2="800" y2="500" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#56B6EA"/>
      <stop offset="100%" stop-color="#3683C0"/>
    </linearGradient>
  </defs>
  <!-- Cloud body -->
  <path d="M 230,470 
           C 100,470 20,380 20,280 
           C 20,200 80,130 160,110 
           C 190,50 280,10 380,10 
           C 510,10 630,90 660,200 
           C 740,210 780,280 780,350 
           C 780,420 720,470 630,470 
           Z" 
        fill="url(#cloudGrad)"/>
        
  <!-- Terminal chevron > -->
  <path d="M 290,180 
           L 410,280 
           L 290,380" 
        fill="none" 
        stroke="white" 
        stroke-width="50" 
        stroke-linecap="round" 
        stroke-linejoin="round"/>
        
  <!-- Terminal underscore _ -->
  <rect x="430" y="345" width="160" height="50" rx="25" fill="white"/>
</svg>
